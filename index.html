<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Математика ЦТ 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="database.js?v=1.0.1"></script> 

    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-secondary: #8e8e93;
            --primary: #007aff;
            --success: #34c759;
            --error: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color) !important;
            color: var(--text-main) !important;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px 15px 80px 15px;
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 65px;
            background: white;
            border-top: 1px solid #e5e5ea;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 11px;
            width: 50%;
        }

        .tab-item.active { color: var(--primary); }
        .tab-icon { font-size: 22px; margin-bottom: 4px; }

        .topic-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .resume-banner {
            background: #e7f3ff;
            border: 1px solid var(--primary);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .image-container img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #eee;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .opt-btn { 
            background: #f1f1f7; 
            padding: 14px; 
            border-radius: 12px; 
            border: 2px solid transparent; 
            color: var(--text-main);
        }
        .opt-btn.selected { border-color: var(--primary); background: #e7f3ff; }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #d1d1d6;
            border-radius: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 16px; /* Предотвращает зум на Samsung/iPhone */
        }

        .main-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 600;
        }

        .correct-bg { background-color: var(--success) !important; }
        .wrong-bg { background-color: var(--error) !important; }

        .stat-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .progress-bg { background: #e5e5ea; height: 8px; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .progress-fill { background: var(--success); height: 100%; transition: 0.5s; width: 0%; }
    </style>
</head>
<body>

<div class="content-area">
    <div id="screen-tests" class="screen active">
        <div id="resume-container" class="resume-banner">
            <p style="margin: 0 0 10px 0;">У тебя есть незаконченный тест!</p>
            <button class="main-btn" onclick="resumeTest()">Продолжить "<span id="resume-topic"></span>"</button>
        </div>
        <h2 id="main-title">Темы ЦТ 2026</h2>
        <div id="topic-list">Подключение к базе данных...</div>
    </div>

    <div id="screen-quiz" class="screen">
        <div style="display:flex; justify-content: space-between; margin-bottom:15px; color:var(--text-secondary);">
            <span id="q-topic-title">Тема</span>
            <span id="q-progress">0 / 0</span>
        </div>
        <div class="image-container"><img id="q-img" src=""></div>
        <div id="options-container" class="options-grid"></div>
        <input type="text" id="user-answer" placeholder="Введите ответ">
        <div id="wrong-hint" style="color:var(--error); text-align:center; display:none; margin-bottom:15px; font-weight:bold;"></div>
        <button class="main-btn" id="submit-btn" onclick="handleCheck()">Ответить</button>
        <div id="solution-section" style="display:none; margin-top:20px; border-top: 1px dashed #ccc; padding-top:20px;">
            <div class="image-container"><img id="s-img" src=""></div>
            <button class="main-btn" style="background:var(--success);" onclick="handleNext()">Далее</button>
        </div>
    </div>

    <div id="screen-stats" class="screen">
        <h2>Твои успехи</h2>
        <div id="stats-container"></div>
    </div>
</div>

<nav class="tab-bar">
    <button class="tab-item active" id="tab-tests" onclick="switchTab('tests')">
        <span class="tab-icon">📖</span>
        <span>Тесты</span>
    </button>
    <button class="tab-item" id="tab-stats" onclick="switchTab('stats')">
        <span class="tab-icon">📈</span>
        <span>Статистика</span>
    </button>
</nav>

<script>
    let currentTest = null;
    let selectedOption = null;
    const tg = window.Telegram.WebApp;
    tg.ready(); // Сообщаем Telegram, что приложение готово
    tg.expand();

    function switchTab(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('screen-' + screenId).classList.add('active');
        document.getElementById('tab-' + screenId).classList.add('active');
        if(screenId === 'stats') renderStats();
        if(screenId === 'tests') { renderTopics(); checkResume(); }
    }

    function checkResume() {
        const saved = localStorage.getItem('active_test');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                document.getElementById('resume-topic').innerText = data.topic;
                document.getElementById('resume-container').style.display = 'block';
            } catch(e) { localStorage.removeItem('active_test'); }
        } else {
            document.getElementById('resume-container').style.display = 'none';
        }
    }

    function renderTopics() {
        if (typeof database === 'undefined') return;
        const list = document.getElementById('topic-list');
        list.innerHTML = '';
        Object.keys(database).forEach(topic => {
            const div = document.createElement('div');
            div.className = 'topic-card';
            div.innerHTML = `<span>${topic}</span> <span style="color:var(--primary)">→</span>`;
            div.onclick = () => startNewTest(topic);
            list.appendChild(div);
        });
    }

    function startNewTest(topic) {
        currentTest = { topic: topic, tasks: database[topic], idx: 0, correct: 0 };
        localStorage.setItem('active_test', JSON.stringify(currentTest));
        openQuiz();
    }

    function resumeTest() {
        currentTest = JSON.parse(localStorage.getItem('active_test'));
        openQuiz();
    }

    function openQuiz() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-quiz').classList.add('active');
        renderTask();
    }

    function renderTask() {
        const task = currentTest.tasks[currentTest.idx];
        selectedOption = null;
        document.getElementById('q-topic-title').innerText = currentTest.topic;
        document.getElementById('q-progress').innerText = `${currentTest.idx + 1} / ${currentTest.tasks.length}`;
        document.getElementById('q-img').src = task.question;
        document.getElementById('s-img').src = task.solution;
        document.getElementById('solution-section').style.display = 'none';
        document.getElementById('wrong-hint').style.display = 'none';
        
        const btn = document.getElementById('submit-btn');
        btn.disabled = false;
        btn.className = 'main-btn';
        btn.innerText = "Ответить";

        const optContainer = document.getElementById('options-container');
        const inputField = document.getElementById('user-answer');
        
        if (task.options && task.options.length > 0) {
            inputField.style.display = 'none';
            optContainer.style.display = 'grid';
            optContainer.innerHTML = '';
            task.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                b.innerText = opt;
                b.onclick = () => {
                    selectedOption = opt;
                    document.querySelectorAll('.opt-btn').forEach(el => el.classList.remove('selected'));
                    b.classList.add('selected');
                };
                optContainer.appendChild(b);
            });
        } else {
            optContainer.style.display = 'none';
            inputField.style.display = 'block';
            inputField.value = '';
            inputField.disabled = false;
        }
    }

    function handleCheck() {
        const task = currentTest.tasks[currentTest.idx];
        const userVal = task.options ? selectedOption : document.getElementById('user-answer').value.trim();
        if (!userVal) return;
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;

        if (String(userVal).toLowerCase() == String(task.answer).toLowerCase()) {
            currentTest.correct++;
            btn.classList.add('correct-bg');
            btn.innerText = "Правильно!";
            tg.HapticFeedback.notificationOccurred('success');
        } else {
            btn.classList.add('wrong-bg');
            btn.innerText = "Неверно";
            document.getElementById('wrong-hint').innerText = `Ответ: ${task.answer}`;
            document.getElementById('wrong-hint').style.display = 'block';
            tg.HapticFeedback.notificationOccurred('error');
        }
        document.getElementById('solution-section').style.display = 'block';
    }

    function handleNext() {
        currentTest.idx++;
        if (currentTest.idx < currentTest.tasks.length) {
            localStorage.setItem('active_test', JSON.stringify(currentTest));
            renderTask();
        } else {
            saveToStats();
        }
    }

    function saveToStats() {
        const stats = JSON.parse(localStorage.getItem('stats') || '{}');
        const topic = currentTest.topic;
        if (!stats[topic]) stats[topic] = { solved: 0, total: 0 };
        stats[topic].solved += currentTest.correct;
        stats[topic].total += currentTest.tasks.length;
        localStorage.setItem('stats', JSON.stringify(stats));
        localStorage.removeItem('active_test');
        alert(`Тест по теме ${topic} завершен!`);
        switchTab('stats');
    }

    function renderStats() {
        if (typeof database === 'undefined') return;
        const container = document.getElementById('stats-container');
        const stats = JSON.parse(localStorage.getItem('stats') || '{}');
        container.innerHTML = Object.keys(database).map(topic => {
            const data = stats[topic] || { solved: 0, total: 0 };
            const percent = data.total > 0 ? Math.round((data.solved / data.total) * 100) : 0;
            return `
                <div class="stat-item">
                    <div style="display:flex; justify-content:space-between; font-weight:600;">
                        <span>${topic}</span><span>${percent}%</span>
                    </div>
                    <div class="progress-bg"><div class="progress-fill" style="width:${percent}%"></div></div>
                </div>
            `;
        }).join('');
    }

    // Критическая правка загрузки:
    function init() {
        if (typeof database !== 'undefined') {
            renderTopics();
            checkResume();
        } else {
            // Если база не загрузилась за 3 сек, пробуем еще раз
            setTimeout(init, 500);
        }
    }

    window.addEventListener('load', init);
</script>
</body>
</html>
