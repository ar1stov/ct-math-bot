<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математика ЦТ 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            color: #8e8e93;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .image-container img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #eee;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .opt-btn {
            background: #f1f1f7;
            color: #1c1c1e;
            border: 2px solid transparent;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .opt-btn.selected {
            border-color: #007aff;
            background: #e7f3ff;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #d1d1d6;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .main-btn {
            width: 100%;
            padding: 16px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .correct-bg { background-color: #34c759 !important; }
        .wrong-bg { background-color: #ff3b30 !important; }
        .correct-border { border-color: #34c759 !important; }
        .wrong-border { border-color: #ff3b30 !important; }

        .wrong-answer-hint {
            color: #ff3b30;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .solution-box {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed #d1d1d6;
        }

        .next-btn { 
            background-color: #34c759 !important; 
            margin-top: 10px; 
        }

        .stats-screen { text-align: center; padding: 40px 20px; }
        .stats-circle { font-size: 48px; font-weight: 800; color: #34c759; margin: 20px 0; }
    </style>
</head>
<body>

<div class="app-container" id="main-content">
    <div id="quiz-screen">
        <div class="header">
            <span id="topic-name">Математика</span>
            <span id="progress-text">0 / 0</span>
        </div>
        
        <div class="image-container">
            <img id="q-img" src="" alt="Загрузка задания...">
        </div>

        <div id="options-container" class="options-grid"></div>
        <input type="text" id="user-answer" placeholder="Ваш ответ" autocomplete="off">
        
        <div id="wrong-hint" class="wrong-answer-hint"></div>
        <button class="main-btn" id="submit-btn" onclick="handleCheck()">Ответить</button>

        <div id="solution-section" class="solution-box">
            <div class="image-container">
                <img id="s-img" src="" alt="Решение">
            </div>
            <!-- Сюда добавлена переменная ID для управления текстом -->
            <button class="main-btn next-btn" id="next-action-btn" onclick="handleNext()">Следующее задание</button>
        </div>
    </div>
</div>

<script>
    const tasks = [
        {
            topic: "Тригонометрия",
            question: "https://placehold.co/600x400?text=Вопрос+A1", 
            solution: "https://placehold.co/600x400?text=Решение+A1",
            options: ["0.5", "1", "0", "-1"],
            answer: "0.5"
        },
        {
            topic: "Логарифмы",
            question: "https://placehold.co/600x400?text=Вопрос+B1",
            solution: "https://placehold.co/600x400?text=Решение+B1",
            answer: "25"
        }
    ];

    let currentIdx = 0;
    let correctCount = 0;
    let selectedOption = null;
    let randomizedTasks = [];

    const tg = window.Telegram.WebApp;
    tg.expand();

    function initQuiz() {
        randomizedTasks = [...tasks].sort(() => Math.random() - 0.5);
        renderTask();
    }

    function renderTask() {
        const task = randomizedTasks[currentIdx];
        selectedOption = null;
        
        document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${randomizedTasks.length}`;
        document.getElementById('q-img').src = task.question;
        document.getElementById('s-img').src = task.solution;
        document.getElementById('solution-section').style.display = 'none';
        document.getElementById('wrong-hint').style.display = 'none';
        
        const btn = document.getElementById('submit-btn');
        btn.disabled = false;
        btn.classList.remove('correct-bg', 'wrong-bg');
        btn.innerText = "Ответить";

        const optContainer = document.getElementById('options-container');
        const inputField = document.getElementById('user-answer');
        inputField.classList.remove('correct-border', 'wrong-border');

        if (task.options) {
            inputField.style.display = 'none';
            optContainer.style.display = 'grid';
            optContainer.innerHTML = '';
            task.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                b.innerText = opt;
                b.onclick = () => {
                    if (btn.disabled) return;
                    document.querySelectorAll('.opt-btn').forEach(el => el.classList.remove('selected'));
                    b.classList.add('selected');
                    selectedOption = opt;
                };
                optContainer.appendChild(b);
            });
        } else {
            optContainer.style.display = 'none';
            inputField.style.display = 'block';
            inputField.value = '';
            inputField.disabled = false;
        }
    }

    function handleCheck() {
        const task = randomizedTasks[currentIdx];
        const btn = document.getElementById('submit-btn');
        const hint = document.getElementById('wrong-hint');
        const inputField = document.getElementById('user-answer');
        const nextBtn = document.getElementById('next-action-btn');
        let userVal = "";

        if (task.options) {
            if (!selectedOption) return;
            userVal = selectedOption;
        } else {
            userVal = inputField.value.trim().replace(',', '.');
            if (userVal === "") return;
            inputField.disabled = true;
        }

        btn.disabled = true;

        // Проверка: последний ли это вопрос?
        if (currentIdx === randomizedTasks.length - 1) {
            nextBtn.innerText = "Завершить тест";
        } else {
            nextBtn.innerText = "Следующее задание";
        }

        if (userVal === task.answer) {
            correctCount++;
            btn.classList.add('correct-bg');
            btn.innerText = "Верно!";
            if (!task.options) inputField.classList.add('correct-border');
            tg.HapticFeedback.notificationOccurred('success');
        } else {
            btn.classList.add('wrong-bg');
            btn.innerText = "Ошибка";
            if (!task.options) inputField.classList.add('wrong-border');
            hint.innerText = `Правильный ответ: ${task.answer}`;
            hint.style.display = 'block';
            tg.HapticFeedback.notificationOccurred('error');
        }

        document.getElementById('solution-section').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function handleNext() {
        currentIdx++;
        if (currentIdx < randomizedTasks.length) renderTask();
        else showStats();
    }

    function showStats() {
        const percent = Math.round((correctCount / randomizedTasks.length) * 100);
        document.getElementById('main-content').innerHTML = `
            <div class="stats-screen">
                <div class="stats-circle">${percent}%</div>
                <p>Результат: ${correctCount} из ${randomizedTasks.length}</p>
                <button class="main-btn" onclick="location.reload()">Еще раз</button>
            </div>`;
    }

    window.onload = initQuiz;
</script>
</body>
</html>
